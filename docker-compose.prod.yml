x-app-volumes: &app-volumes
  - ./app:/var/www/html/app
  - ./bootstrap/app.php:/var/www/html/bootstrap/app.php
  - ./config:/var/www/html/config
  - ./database:/var/www/html/database
  - ./routes:/var/www/html/routes
  - ./resources:/var/www/html/resources
  - ./artisan:/var/www/html/artisan

services:
  app:
    build:
      context: .
      target: app
    image: owner-analytics-app:prod
    command: >
      sh -lc "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes: *app-volumes
    depends_on:
      - postgres

  scheduler:
    image: owner-analytics-app:prod
    command: >
      sh -lc "php artisan schedule:work"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes: *app-volumes
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: owner_analytics
      POSTGRES_USER: owner
      POSTGRES_PASSWORD: owner
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
