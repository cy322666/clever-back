services:
  app:
    build:
      context: .
      target: app
    image: owner-analytics-app:prod
    command: >
      sh -lc "if [ ! -f vendor/autoload.php ] || [ ! -f vendor/symfony/deprecation-contracts/function.php ];
      then composer install --no-dev --no-interaction --no-scripts --prefer-dist --ignore-platform-req=ext-gd --ignore-platform-req=ext-intl;
      fi;
      php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      - postgres

  scheduler:
    image: owner-analytics-app:prod
    command: >
      sh -lc "if [ ! -f vendor/autoload.php ] || [ ! -f vendor/symfony/deprecation-contracts/function.php ];
      then composer install --no-dev --no-interaction --no-scripts --prefer-dist --ignore-platform-req=ext-gd --ignore-platform-req=ext-intl;
      fi;
      php artisan schedule:work"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: owner_analytics
      POSTGRES_USER: owner
      POSTGRES_PASSWORD: owner
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
